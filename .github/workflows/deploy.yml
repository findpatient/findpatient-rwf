name: Build RWF Config

on:
  push:
    branches: [ main ]

jobs:
  build-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate config.js
        run: |
          echo "window.findpatientConfig = {" > config.js

          # Insert org.json contents WITHOUT outer braces
          sed '1d;$d' org.json >> config.js
          echo "," >> config.js

          # Inject private secrets
          echo "  \"secrets\": {" >> config.js
          echo "    \"urls\": \"${{ secrets.ORG_URLS }}\"," >> config.js
          echo "    \"status\": \"${{ secrets.ORG_STATUS }}\"," >> config.js
          echo "    \"features\": \"${{ secrets.ORG_FEATURES }}\"," >> config.js
          echo "    \"env\": \"${{ secrets.ORG_ENV }}\"" >> config.js
          echo "  }" >> config.js

          echo "};" >> config.js

      - name: Upload config.js artifact
        uses: actions/upload-artifact@v4
        with:
          name: rwf-config
          path: config.js