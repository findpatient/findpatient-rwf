name: Build and Deploy RWF

on:
  push:
    branches: [ main ]

jobs:
  build-config:
    runs-on: ubuntu-latest
    outputs:
      config-path: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate config.js
        run: |
          echo "window.findpatientConfig = {" > config.js

          # Insert org.json contents WITHOUT outer braces, add comma at end
          sed '1d;$d' org.json | sed '$s/$/,/' >> config.js

          # Inject private secrets
          echo "  \"secrets\": {" >> config.js
          echo "    \"urls\": \"${{ secrets.ORG_URLS }}\"," >> config.js
          echo "    \"status\": \"${{ secrets.ORG_STATUS }}\"," >> config.js
          echo "    \"features\": \"${{ secrets.ORG_FEATURES }}\"," >> config.js
          echo "    \"env\": \"${{ secrets.ORG_ENV }}\"" >> config.js
          echo "  }" >> config.js

          echo "};" >> config.js

      - name: Upload config.js artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: rwf-config
          path: config.js

  deploy:
    needs: build-config
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download config.js artifact
        uses: actions/download-artifact@v4
        with:
          name: rwf-config
          path: .

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        uses: actions/deploy-pages@v4
