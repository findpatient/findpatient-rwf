name: Build and Deploy RWF

on:
  push:
    branches: [ main ]

jobs:
  build-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout RWF repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate config.js
        run: |
          echo "window.findpatientConfig = {" > config.js

          # Insert org.json contents WITHOUT outer braces, add comma at end
          sed '1d;$d' org.json | sed '$s/$/,/' >> config.js

          # Inject private secrets (proper JSON)
          echo "  \"secrets\": {" >> config.js
          echo "    \"urls\": $(echo '${{ secrets.ORG_URLS }}' | jq -c .)," >> config.js
          echo "    \"status\": $(echo '${{ secrets.ORG_STATUS }}' | jq -c .)," >> config.js
          echo "    \"features\": $(echo '${{ secrets.ORG_FEATURES }}' | jq -c .)," >> config.js
          echo "    \"env\": $(echo '${{ secrets.ORG_ENV }}' | jq -c .)" >> config.js
          echo "  }" >> config.js

          echo "};" >> config.js

      - name: Upload config.js artifact
        uses: actions/upload-artifact@v4
        with:
          name: rwf-config
          path: config.js

  deploy:
    needs: build-config
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout RWF repo
        uses: actions/checkout@v4

      - name: Checkout core repo
        uses: actions/checkout@v4
        with:
          repository: findpatient/findpatientdev
          path: core

      - name: Download config.js artifact
        uses: actions/download-artifact@v4
        with:
          name: rwf-config
          path: .

      - name: Prepare deployment folder
        run: |
          mkdir build
          cp -R core/* build/
          cp config.js build/config.js

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy
        uses: actions/deploy-pages@v4
