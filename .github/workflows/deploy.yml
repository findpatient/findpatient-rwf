name: Build RWF Config

on:
  push:
    branches: [ main ]

jobs:
  build-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read org.json
        id: orgjson
        run: |
          echo "ORG_JSON<<EOF" >> $GITHUB_ENV
          cat org.json >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate config.js
        run: |
          echo "window.findpatientConfig = {" > config.js

          # Insert org.json contents directly
          cat org.json >> config.js
          echo "," >> config.js

          # Inject private secrets
          echo "  \"secrets\": {" >> config.js
          echo "    \"urls\": \"${{ secrets.ORG_URLS }}\"," >> config.js
          echo "    \"status\": \"${{ secrets.ORG_STATUS }}\"," >> config.js
          echo "    \"features\": \"${{ secrets.ORG_FEATURES }}\"," >> config.js
          echo "    \"env\": \"${{ secrets.ORG_ENV }}\"" >> config.js
          echo "  }" >> config.js

          echo "};" >> config.js



      - name: Upload artifact (config only)
        uses: actions/upload-artifact@v4
        with:
          name: rwf-config
          path: config.js
